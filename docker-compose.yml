version: '3.8'

services:
  # Reverse proxy nginx — point d'entrée unique
  nginx:
    image: nginx:alpine
    container_name: barcode-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - barcode-network

  # Backend Python Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: barcode-crm-backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - APP_MODE=production
      - PORT=5000
    networks:
      - barcode-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/items')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: barcode-crm-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - barcode-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  barcode-network:
    driver: bridge
